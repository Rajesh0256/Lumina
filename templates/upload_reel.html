{% extends 'base.html' %}
{% block title %}Add Reel · Lumina{% endblock %}
{% block content %}
<div class="upload-card">
  <h2 class="upload-title">Add a Reel</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <!-- Tab switcher -->
  <div class="reel-tabs">
    <button class="reel-tab active" onclick="switchTab('yt', this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#ff0000"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.1c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.2v2c0 2.1.3 4.2.3 4.2s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.2 21.6 12 21.6 12 21.6s4.2 0 6.8-.2c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.2v-2C23.3 9.1 23 7 23 7zM9.7 15.5V8.4l8.1 3.6-8.1 3.5z"/></svg>
      YouTube / Shorts
    </button>
    <button class="reel-tab" onclick="switchTab('upload', this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Upload Video
    </button>
  </div>

  <!-- YouTube tab -->
  <form method="post" enctype="multipart/form-data" id="form-yt" class="upload-form">
    <div class="yt-input-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#ff0000"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.1c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.2v2c0 2.1.3 4.2.3 4.2s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.2 21.6 12 21.6 12 21.6s4.2 0 6.8-.2c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.2v-2C23.3 9.1 23 7 23 7zM9.7 15.5V8.4l8.1 3.6-8.1 3.5z"/></svg>
      <input type="url" name="yt_url" id="ytUrl"
             placeholder="Paste YouTube or Shorts URL…"
             oninput="previewYT(this.value)"/>
    </div>

    <!-- Live preview -->
    <div id="ytPreview" class="yt-preview" hidden>
      <iframe id="ytFrame" src="" frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen style="width:100%;aspect-ratio:9/16;border-radius:12px"></iframe>
    </div>

    <input type="text" name="caption" placeholder="Write a caption…" maxlength="300"/>
    <button type="submit" class="post-btn" style="width:100%;justify-content:center">Share Reel</button>
  </form>

  <!-- Upload tab -->
  <form method="post" enctype="multipart/form-data" id="form-upload" class="upload-form" style="display:none">
    <label class="drop-zone" id="dropZone">
      <input type="file" name="video" id="videoInput" accept="video/mp4,video/mov,video/webm,video/ogg" hidden/>
      <div class="drop-inner" id="dropInner">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke-width="1.4">
          <defs><linearGradient id="vg" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#f97316"/>
          </linearGradient></defs>
          <rect x="2" y="3" width="20" height="14" rx="2" stroke="url(#vg)"/>
          <path d="M8 21h8M12 17v4" stroke="url(#vg)"/>
          <polygon points="10 8 16 11 10 14 10 8" fill="url(#vg)"/>
        </svg>
        <p>Click or drag a video here</p>
        <span>MP4, MOV, WEBM up to 200MB</span>
      </div>
      <video id="preview" hidden muted playsinline controls style="width:100%;border-radius:14px;max-height:320px"></video>
    </label>
    <input type="text" name="caption" placeholder="Write a caption…" maxlength="300"/>
    <button type="submit" class="post-btn" style="width:100%;justify-content:center">Share Reel</button>
  </form>
</div>

<script>
function switchTab(tab, btn) {
  document.querySelectorAll('.reel-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-yt').style.display     = tab === 'yt'     ? 'flex' : 'none';
  document.getElementById('form-upload').style.display = tab === 'upload' ? 'flex' : 'none';
}

// YouTube live preview
function extractYTId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1].substring(0, 11) : null;
}
function previewYT(url) {
  const id   = extractYTId(url);
  const prev = document.getElementById('ytPreview');
  const frame = document.getElementById('ytFrame');
  if (id) {
    frame.src = `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`;
    prev.hidden = false;
  } else {
    prev.hidden = true;
    frame.src = '';
  }
}

// Local video preview
const input = document.getElementById('videoInput');
const zone  = document.getElementById('dropZone');
const inner = document.getElementById('dropInner');
const prev  = document.getElementById('preview');

zone.addEventListener('click', () => input.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) showPreview(file);
});
input.addEventListener('change', () => { if (input.files[0]) showPreview(input.files[0]); });

function showPreview(file) {
  const dt = new DataTransfer(); dt.items.add(file); input.files = dt.files;
  prev.src = URL.createObjectURL(file);
  prev.hidden = false;
  inner.hidden = true;
}
</script>
{% endblock %}
